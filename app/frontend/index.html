<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>HR Manager Login</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
        }

        body {
            background-color: #f3f4f6;
            color: #111827;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            background: #fff;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .login-container h2 {
            margin-bottom: 2rem;
            text-align: center;
            font-weight: 800;
            color: #1f2937;
            font-size: 1.875rem;
            transition: all 0.3s ease;
        }

        .role-switcher {
            display: flex;
            background: #f3f4f6;
            padding: 0.25rem;
            border-radius: 0.75rem;
            margin-bottom: 2rem;
        }

        .role-btn {
            flex: 1;
            padding: 0.5rem;
            border: none;
            background: transparent;
            border-radius: 0.6rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.2s;
        }

        .role-btn.active {
            background: #fff;
            color: var(--primary);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .login-container label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: #4b5563;
        }

        .login-container input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1.25rem;
            border: 1px solid #d1d5db;
            border-radius: 0.75rem;
            box-sizing: border-box;
        }

        .login-container input:focus {
            outline: 2px solid var(--primary);
        }

        .btn-primary {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 0.75rem;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .error {
            color: #dc2626;
            margin-top: 1rem;
            text-align: center;
            font-size: 0.875rem;
            min-height: 1.25rem;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="role-switcher">
            <button class="role-btn active" onclick="setRole('employee')">Employee</button>
            <button class="role-btn" onclick="setRole('hr')">Admin</button>
        </div>
        <h2 id="loginTitle">Employee Login Page</h2>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username" />
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" />
        </div>
        <button class="btn-primary" onclick="login()">Sign In</button>
        <div class="error" id="errorMsg"></div>
    </div>
    <script>
        let currentRole = 'employee';

        function setRole(role) {
            currentRole = role;
            const buttons = document.querySelectorAll('.role-btn');
            const title = document.getElementById('loginTitle');

            buttons.forEach(btn => {
                const isActive = btn.textContent.toLowerCase().includes(role === 'hr' ? 'admin' : 'employee');
                btn.classList.toggle('active', isActive);
            });

            if (role === 'hr') {
                title.textContent = 'Admin Login Page';
                document.documentElement.style.setProperty('--primary', '#8b5cf6'); // Purple for Admin
                document.documentElement.style.setProperty('--primary-hover', '#7c3aed');
            } else {
                title.textContent = 'Employee Login Page';
                document.documentElement.style.setProperty('--primary', '#6366f1'); // Indigo for Employee
                document.documentElement.style.setProperty('--primary-hover', '#4f46e5');
            }
        }

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = '';
            if (!username || !password) {
                errorDiv.textContent = 'Please enter both credentials';
                return;
            }
            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ username, password, role: currentRole })
                });
                if (!resp.ok) {
                    const errorData = await resp.json();
                    throw new Error(errorData.detail || 'Invalid username or password');
                }
                const data = await resp.json();
                localStorage.setItem('token', data.access_token);
                const payload = JSON.parse(atob(data.access_token.split('.')[1]));
                if (payload.role === 'hr') {
                    window.location.href = '/hr_dashboard.html';
                } else {
                    window.location.href = '/employee_dashboard.html';
                }
            } catch (e) {
                errorDiv.textContent = e.message;
            }
        }
        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
    </script>
</body>

</html>
